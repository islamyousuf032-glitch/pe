<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yousuf Unbound</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            serif: ['Playfair Display', 'ui-serif', 'Georgia', 'serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Custom Animations CSS -->
  <style>
    @keyframes slowZoom {
      from { opacity: 0; transform: scale(1.1); }
      to { opacity: 0.8; transform: scale(1.05); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeScaleUp {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.2); opacity: 0.5; }
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%) skewX(30deg); }
      100% { transform: translateX(200%) skewX(30deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUpFade {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .animate-slow-zoom { animation: slowZoom 2.5s ease-out forwards; }
    .animate-slide-right-1 { animation: slideRight 1s ease-out 0.5s forwards; opacity: 0; }
    .animate-slide-right-2 { animation: slideRight 1s ease-out 0.7s forwards; opacity: 0; }
    .animate-fade-scale { animation: fadeScaleUp 1.5s ease-out 1s forwards; opacity: 0; }
    .animate-pulse-glow { animation: pulseGlow 4s ease-in-out infinite; }
    .animate-shimmer { animation: shimmer 3s linear infinite; animation-delay: 1s; }
    .animate-fade-in-1 { animation: fadeIn 1.5s ease-out 1.5s forwards; opacity: 0; }
    .animate-fade-in-2 { animation: fadeIn 1.5s ease-out 1.7s forwards; opacity: 0; }
    .animate-slide-up-fade { animation: slideUpFade 1.2s ease-out 1.2s forwards; opacity: 0; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white overflow-hidden">

  <div class="relative h-[100dvh] w-screen overflow-hidden select-none">
    
    <!-- Background Video -->
    <div class="absolute inset-0 z-0 pointer-events-none animate-slow-zoom">
      <video
        autoplay
        loop
        muted
        playsinline
        poster="/src/assets/images/cinematic_portrait_bg_1779799111503.png"
        class="w-full h-full object-cover"
      >
        <source src="./video.mp4" type="video/mp4" />

      </video>
    </div>
    
    <!-- Vignette / Shadow Overlay -->
    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/10 to-black/90 pointer-events-none"></div>

    <!-- Main Container -->
    <div class="relative z-10 w-full h-full text-[#ebe5da] p-8 md:p-12 font-serif flex flex-col justify-between">
      
      <!-- Top Left Title -->
      <div class="uppercase leading-none tracking-[0.1em] text-white">
        <h1 class="text-4xl md:text-[4rem] font-medium mb-4 drop-shadow-xl animate-slide-right-1 tracking-[0.1em] text-white">Yousuf</h1>
        <h2 class="text-4xl md:text-[4rem] font-medium drop-shadow-xl text-[#d8d1c6] animate-slide-right-2 tracking-[0.1em]">Unbound</h2>
      </div>

      <!-- Center Button Area -->
      <div class="absolute top-1/2 left-1/2 flex items-center justify-center group/btn z-20 animate-fade-scale" style="transform: translate(-50%, -50%)">
        
        <!-- Pulsing subtle glow behind the button -->
        <div class="absolute w-[250px] md:w-[300px] h-[120px] md:h-[150px] bg-pink-500/20 blur-[40px] md:blur-[50px] rounded-[100px] mix-blend-screen pointer-events-none transition-all duration-700 group-hover/btn:bg-pink-400/40 animate-pulse-glow"></div>
        
        <button class="relative overflow-hidden px-12 md:px-16 py-3 md:py-4 rounded-full border border-white/20 backdrop-blur-md bg-black/20 uppercase tracking-[0.2em] md:tracking-[0.3em] font-sans text-sm md:text-base font-light text-[#ebe5da] transition-all duration-500 hover:text-white hover:border-white/60 hover:bg-white/10 hover:shadow-[0_0_40px_rgba(236,72,153,0.3)] hover:scale-105 active:scale-95 focus:outline-none flex items-center justify-center">
          
          <!-- Shimmer sweep effect -->
          <div class="absolute inset-y-0 left-0 w-1/2 bg-gradient-to-r from-transparent via-white/10 to-transparent animate-shimmer pointer-events-none" style="transform: skewX(30deg)"></div>
          
          <span class="relative z-10 drop-shadow-md">Explore</span>
        </button>
      </div>

      <!-- Vertical Text - Left -->
      <div 
        style="transform: translate(-50%, -50%) rotate(-90deg); top: 50%; left: 3rem; position: absolute; white-space: nowrap;"
        class="hidden md:block pointer-events-none animate-fade-in-1"
      >
        <p class="uppercase tracking-[0.4em] font-sans text-xs font-light text-[#d8d1c6] opacity-70">
          Crafting Chaos In The Shadows
        </p>
      </div>

      <!-- Vertical Text - Right -->
      <div 
        style="transform: translate(50%, -50%) rotate(90deg); top: 50%; right: 3rem; position: absolute; white-space: nowrap;"
        class="hidden md:block pointer-events-none animate-fade-in-2"
      >
        <p class="uppercase tracking-[0.4em] font-sans text-xs font-light text-[#d8d1c6] opacity-70">
          Beyond The Human Imagination
        </p>
      </div>

      <!-- Bottom Center Text -->
      <div class="absolute bottom-10 left-1/2 w-full text-center pointer-events-none animate-slide-up-fade" style="transform: translateX(-50%)">
        <p class="uppercase tracking-[0.25em] font-sans text-xs md:text-sm font-light opacity-80 drop-shadow-md px-4">
          Where Reality Fades, The Unbound Begins
        </p>
      </div>
      
    </div>
  </div>

</body>
</html>
